; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
; board_build.partitions = huge_app.csv
framework = arduino
build_flags = -D ICM_20948_USE_DMP
build_src_filter = +<*> -<as5600_test.cpp> -<wheel_test.cpp>
lib_deps = 
	workloads/SCServo@^1.0.1
	sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library@^1.3.2
	askuric/Simple FOC@^2.4.0

[env:as5600_test]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
build_src_filter = -<*> +<as5600_test.cpp>
lib_deps =
	askuric/Simple FOC@^2.4.0

[env:wheel_test]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
build_src_filter = -<*> +<wheel_test.cpp> +<wheel.cpp> +<wheel_task.cpp>
lib_deps =
	askuric/Simple FOC@^2.4.0
	workloads/SCServo@^1.0.1
	sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library@^1.3.2
